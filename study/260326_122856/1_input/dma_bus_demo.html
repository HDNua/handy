<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DMA / Bus / IRQ Interactive Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  
  :root {
    --bg-dark: #0a0e17;
    --panel-bg: rgba(20, 26, 41, 0.6);
    --panel-border: rgba(69, 87, 126, 0.4);
    --text-primary: #f0f4ff;
    --text-muted: #9ba8c9;
    --accent-blue: #4dabf7;
    --accent-purple: #c58cf3;
    --accent-green: #40c057;
    --accent-yellow: #fcc419;
    --accent-red: #ff6b6b;
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at top right, #111a2f, #0a0e17);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 30px;
  }

  header {
    margin-bottom: 24px;
    text-align: center;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(90deg, #4dabf7, #c58cf3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    color: var(--text-muted);
    font-size: 15px;
    max-width: 800px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .grid {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 24px;
  }

  .panel {
    background: var(--panel-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    box-shadow: var(--glass-shadow);
    padding: 24px;
  }

  h2 {
    margin: 0 0 16px;
    font-size: 18px;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }

  .btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  button {
    background: rgba(43, 56, 86, 0.6);
    border: 1px solid #3c4b71;
    color: var(--text-primary);
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  button:hover {
    background: rgba(69, 87, 126, 0.8);
    transform: translateX(4px);
  }

  button.active {
    background: linear-gradient(90deg, rgba(77, 171, 247, 0.2), rgba(197, 140, 243, 0.2));
    border-color: var(--accent-blue);
    box-shadow: 0 0 15px rgba(77, 171, 247, 0.3);
  }

  button.active::after {
    content: "●";
    color: var(--accent-blue);
    text-shadow: 0 0 8px var(--accent-blue);
  }

  .status-box {
    margin-top: 24px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: #d0d8ed;
    border-left: 4px solid var(--accent-blue);
    min-height: 100px;
  }

  .step-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 14px;
  }

  .step-nav button {
    width: 44px;
    height: 44px;
    padding: 0;
    border-radius: 50%;
    font-size: 20px;
    text-align: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .step-nav button:disabled {
    opacity: 0.25;
    cursor: not-allowed;
    transform: none;
  }

  .step-indicator {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
  }

  .seq-step {
    display: none;
    animation: fadeIn 0.4s ease forwards;
  }
  
  .seq-step.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .legend {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
  }

  .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
  }

  .stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  svg {
    width: 100%;
    max-width: 800px;
    height: auto;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
  }

  /* Node Styling */
  .node-bg {
    fill: rgba(22, 31, 51, 0.8);
    stroke: var(--panel-border);
    stroke-width: 2;
    rx: 16;
    ry: 16;
    transition: all 0.3s ease;
  }
  .node-cpu { stroke: var(--accent-purple); }
  .node-dma { stroke: var(--accent-yellow); }
  .node-mem { stroke: var(--accent-green); }
  .node-ip  { stroke: var(--accent-red); }
  .node-bus { stroke: var(--accent-blue); fill: rgba(14, 25, 46, 0.9); }

  .node-text-title {
    fill: #fff;
    font-size: 22px;
    font-weight: 700;
    pointer-events: none;
  }
  .node-text-sub {
    fill: var(--text-muted);
    font-size: 12px;
    pointer-events: none;
  }

  /* Line Styling */
  .path-line {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke 0.3s ease, opacity 0.3s ease;
    opacity: 0.2;
  }

  /* Animated Overlay Lines */
  .path-flow {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 12 12;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .path-flow.active {
    opacity: 1;
    animation: flowAnim 1s linear infinite;
  }

  @keyframes flowAnim {
    to { stroke-dashoffset: -24; }
  }

  .flow-cpu { stroke: var(--accent-purple); filter: drop-shadow(0 0 6px var(--accent-purple)); }
  .flow-dma { stroke: var(--accent-yellow); filter: drop-shadow(0 0 6px var(--accent-yellow)); }
  .flow-dram { stroke: var(--accent-green); filter: drop-shadow(0 0 6px var(--accent-green)); }
  .flow-irq { 
    stroke: var(--accent-red); 
    stroke-dasharray: 6 6;
    stroke-width: 4;
    filter: drop-shadow(0 0 8px var(--accent-red)); 
  }

  /* Payload Labels */
  .payload-bg {
    fill: rgba(10, 15, 26, 0.9);
    stroke: rgba(255,255,255,0.2);
    rx: 8;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .payload-text {
    fill: #fff;
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .payload-group.active .payload-bg,
  .payload-group.active .payload-text {
    opacity: 1;
  }
  
  /* Highlight effect for nodes */
  .node-group.pulse .node-bg {
    filter: drop-shadow(0 0 15px currentColor);
  }

</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>HW System Architecture: CPU vs DMA</h1>
    <div class="sub">
      이 데모는 <b>RTL 검증 엔지니어의 관점</b>에서 메모리 트랜잭션과 인터럽트 구조를 직관적으로 시각화합니다.<br>
      CPU 복사와 DMA 전송(Bus Master/Slave 역할 전환 및 IRQ 발생)의 핵심 개념을 검증합니다.
    </div>
  </header>

  <div class="grid">
    <div class="left-col">
      <div class="panel">
        <h2>동작 시나리오</h2>
        <div class="btns">
          <button id="btn1" onclick="playMode(1)">1. CPU Direct Copy (MIPS 낭비)</button>
          <button id="btn2" onclick="playMode(2)" class="active">2. DMA Sequence (Master/Slave)</button>
          <button id="btn3" onclick="playMode(3)">3. RO Register Polling</button>
        </div>

        <div class="status-box" id="statusBox">
          <!-- Text injected via JS -->
        </div>

        <div class="step-nav">
          <button id="btn-prev" onclick="goStep(-1)">←</button>
          <span class="step-indicator" id="step-indicator">1 / 1</span>
          <button id="btn-next" onclick="goStep(1)">→</button>
        </div>

        <div class="legend">
          <div class="legend-item"><div class="legend-color" style="background:var(--accent-purple)"></div>CPU Master Bus</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--accent-yellow)"></div>DMA Master Bus</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--accent-red)"></div>IRQ Signal (Wire)</div>
          <div class="legend-item"><div class="legend-color" style="background:var(--accent-green)"></div>DRAM Slave Port</div>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="panel stage">
        <svg viewBox="0 0 900 600" id="canvas">
          <!-- Defined Markers for Flow Direction -->
          <defs>
            <marker id="arrow-cpu" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-purple)" />
            </marker>
            <marker id="arrow-dma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-yellow)" />
            </marker>
            <marker id="arrow-irq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <polygon points="0,0 10,5 0,10" fill="var(--accent-red)" />
            </marker>
          </defs>

          <!-- BASE LINES (Faded) -->
          <!-- CPU to BUS -->
          <path d="M 450 160 L 450 240 M 450 250 L 450 280" class="path-line" />
          <!-- IP to BUS -->
          <path d="M 180 340 L 180 250 L 350 250" class="path-line" />
          <!-- DMA to BUS (Master) -->
          <path d="M 520 420 L 520 280" class="path-line" />
          <!-- BUS to DMA Reg (Slave config) -->
          <path d="M 450 320 L 450 420" class="path-line" />
          <!-- BUS to DRAM -->
          <path d="M 550 250 L 720 250 L 720 200" class="path-line" />
          <!-- IP to DMA (Peripheral Data Interface) -->
          <path d="M 240 460 L 390 460" class="path-line" />
          <!-- DMA to CPU (IRQ WIRE) -->
          <path d="M 440 420 L 400 360 L 400 160" class="path-line" />

          <!-- ANIMATED FLOW LINES -->
          
          <!-- Mode 1 & 3: IP -> BUS (CPU reading) -->
          <path id="f-ip-bus" d="M 180 340 L 180 250 L 340 250" class="path-flow flow-cpu" marker-end="url(#arrow-cpu)" />
          
          <!-- Mode 1: CPU -> BUS -> DRAM (CPU Writing) -->
          <path id="f-cpu-bus" d="M 430 160 L 430 250 L 540 250" class="path-flow flow-cpu" marker-end="url(#arrow-cpu)" />
          <path id="f-bus-dram-cpu" d="M 560 250 L 720 250 L 720 210" class="path-flow flow-cpu" marker-end="url(#arrow-cpu)" />

          <!-- Mode 2 Step 1: CPU -> BUS -> DMA (Config) -->
          <path id="f-cpu-config" d="M 450 160 L 450 280" class="path-flow flow-cpu" marker-end="url(#arrow-cpu)" />
          <path id="f-bus-dma-config" d="M 450 320 L 450 410" class="path-flow flow-cpu" marker-end="url(#arrow-cpu)" />

          <!-- Mode 2 Step 2: IP -> DMA -> BUS -> DRAM (DMA Transfer) -->
          <path id="f-ip-dma" d="M 240 460 L 380 460" class="path-flow flow-dma" marker-end="url(#arrow-dma)" />
          <path id="f-dma-bus" d="M 520 420 L 520 290" class="path-flow flow-dma" marker-end="url(#arrow-dma)" />
          <path id="f-bus-dram-dma" d="M 560 250 L 730 250 L 730 210" class="path-flow flow-dma" marker-end="url(#arrow-dma)" />

          <!-- Mode 2 Step 3: DMA -> CPU (IRQ) -->
          <path id="f-irq" d="M 430 420 L 380 360 L 380 170" class="path-flow flow-irq" marker-end="url(#arrow-irq)" />

          <!-- NODES -->
          <!-- CPU -->
          <g class="node-group" id="node-cpu">
            <rect x="350" y="60" width="200" height="100" class="node-bg node-cpu" />
            <text x="450" y="105" text-anchor="middle" class="node-text-title">CPU</text>
            <text x="450" y="130" text-anchor="middle" class="node-text-sub">System Master</text>
          </g>

          <!-- DRAM -->
          <g class="node-group" id="node-dram">
            <rect x="660" y="60" width="160" height="140" class="node-bg node-mem" />
            <text x="740" y="125" text-anchor="middle" class="node-text-title">DRAM</text>
            <text x="740" y="150" text-anchor="middle" class="node-text-sub">Memory Slave</text>
          </g>

          <!-- Interconnect / BUS -->
          <g class="node-group" id="node-bus">
            <rect x="350" y="240" width="200" height="80" class="node-bg node-bus" />
            <text x="450" y="280" text-anchor="middle" class="node-text-title" style="font-size:18px;">AXI Interconnect</text>
            <text x="450" y="300" text-anchor="middle" class="node-text-sub">Routing & Arbitration</text>
          </g>

          <!-- IP -->
          <g class="node-group" id="node-ip">
            <rect x="80" y="340" width="160" height="160" class="node-bg node-ip" />
            <text x="160" y="415" text-anchor="middle" class="node-text-title">IP</text>
            <text x="160" y="440" text-anchor="middle" class="node-text-sub">Data Producer</text>
            <text x="160" y="460" text-anchor="middle" class="node-text-sub">(e.g., DM Client)</text>
          </g>

          <!-- DMA -->
          <g class="node-group" id="node-dma">
            <rect x="390" y="420" width="160" height="140" class="node-bg node-dma" />
            <text x="470" y="485" text-anchor="middle" class="node-text-title">DMA</text>
            <text x="470" y="510" text-anchor="middle" class="node-text-sub">Transfer Engine</text>
            <text x="470" y="530" text-anchor="middle" class="node-text-sub">Master & Slave</text>
          </g>

          <!-- TAGS & PAYLOADS -->
          <g class="payload-group" id="tag-cpu-read">
            <rect x="200" y="225" width="90" height="24" class="payload-bg" />
            <text x="245" y="242" text-anchor="middle" class="payload-text">Read Reg</text>
          </g>

          <g class="payload-group" id="tag-cpu-write">
            <rect x="580" y="220" width="100" height="24" class="payload-bg" />
            <text x="630" y="237" text-anchor="middle" class="payload-text" fill="var(--accent-purple)">Store Data</text>
          </g>

          <g class="payload-group" id="tag-dma-cfg">
            <rect x="460" y="340" width="110" height="24" class="payload-bg" />
            <text x="515" y="357" text-anchor="middle" class="payload-text">Config Write</text>
          </g>

          <g class="payload-group" id="tag-dma-data">
            <rect x="260" y="430" width="90" height="24" class="payload-bg" />
            <text x="305" y="447" text-anchor="middle" class="payload-text">Stream Req</text>
          </g>
          
          <g class="payload-group" id="tag-dma-burst">
            <rect x="580" y="260" width="100" height="24" class="payload-bg" />
            <text x="630" y="277" text-anchor="middle" class="payload-text" fill="var(--accent-yellow)">Burst Write</text>
          </g>

          <g class="payload-group" id="tag-irq">
            <rect x="290" y="310" width="80" height="24" class="payload-bg" />
            <text x="330" y="327" text-anchor="middle" class="payload-text" fill="var(--accent-red)">IRQ Assert</text>
          </g>

        </svg>
      </div>
    </div>
  </div>
</div>

<script>
  let currentMode = 2;
  let currentStep = 1;

  const stepCount = { 1: 1, 2: 3, 3: 1 };

  const els = {
    btns: [document.getElementById('btn1'), document.getElementById('btn2'), document.getElementById('btn3')],
    statusBox: document.getElementById('statusBox'),
    stepIndicator: document.getElementById('step-indicator'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next'),

    flowIpBus:      document.getElementById('f-ip-bus'),
    flowCpuBus:     document.getElementById('f-cpu-bus'),
    flowBusDramCpu: document.getElementById('f-bus-dram-cpu'),
    flowCpuCfg:     document.getElementById('f-cpu-config'),
    flowBusDmaCfg:  document.getElementById('f-bus-dma-config'),
    flowIpDma:      document.getElementById('f-ip-dma'),
    flowDmaBus:     document.getElementById('f-dma-bus'),
    flowBusDramDma: document.getElementById('f-bus-dram-dma'),
    flowIrq:        document.getElementById('f-irq'),

    tagCpuRead:  document.getElementById('tag-cpu-read'),
    tagCpuWrite: document.getElementById('tag-cpu-write'),
    tagDmaCfg:   document.getElementById('tag-dma-cfg'),
    tagDmaData:  document.getElementById('tag-dma-data'),
    tagDmaBurst: document.getElementById('tag-dma-burst'),
    tagIrq:      document.getElementById('tag-irq'),

    nodeCpu: document.getElementById('node-cpu'),
    nodeDma: document.getElementById('node-dma'),
    nodeMem: document.getElementById('node-dram'),
    nodeIp:  document.getElementById('node-ip'),
  };

  function clearAll() {
    els.btns.forEach(b => b.classList.remove('active'));
    [
      els.flowIpBus, els.flowCpuBus, els.flowBusDramCpu,
      els.flowCpuCfg, els.flowBusDmaCfg, els.flowIpDma,
      els.flowDmaBus, els.flowBusDramDma, els.flowIrq
    ].forEach(el => el.classList.remove('active'));
    [
      els.tagCpuRead, els.tagCpuWrite, els.tagDmaCfg,
      els.tagDmaData, els.tagDmaBurst, els.tagIrq
    ].forEach(el => el.classList.remove('active'));
    [els.nodeCpu, els.nodeDma, els.nodeMem, els.nodeIp].forEach(el => el.classList.remove('pulse'));
  }

  function updateNav() {
    const total = stepCount[currentMode];
    els.stepIndicator.textContent = total === 1 ? '—' : `${currentStep} / ${total}`;
    els.btnPrev.disabled = currentStep <= 1;
    els.btnNext.disabled = currentStep >= total;
  }

  function render() {
    clearAll();
    els.btns[currentMode - 1].classList.add('active');
    updateNav();

    if (currentMode === 1) {
      els.nodeCpu.classList.add('pulse');
      els.flowIpBus.classList.add('active');
      els.flowCpuBus.classList.add('active');
      els.flowBusDramCpu.classList.add('active');
      els.tagCpuRead.classList.add('active');
      els.tagCpuWrite.classList.add('active');
      els.statusBox.innerHTML = `
        <strong style="color:var(--accent-purple)">CPU Bus Master 모드</strong><br>
        CPU가 직접 IP의 결과 레지스터를 읽고(Load), 버스를 통해 DRAM에 씁니다(Store).<br><br>
        <i>단점:</i> 데이터 전송 시 CPU 점유율이 높아져 다른 작업을 수행하지 못합니다. MIPS 낭비가 심합니다.
      `;
    }

    else if (currentMode === 2) {
      if (currentStep === 1) {
        els.nodeCpu.classList.add('pulse');
        els.flowCpuCfg.classList.add('active');
        els.flowBusDmaCfg.classList.add('active');
        els.tagDmaCfg.classList.add('active');
        els.statusBox.innerHTML = `
          <strong style="color:var(--accent-purple)">Step 1: CPU → DMA 설정 (DMA = Slave)</strong><br>
          CPU가 AXI Bus를 거쳐 DMA의 Control Register(Slave Port)에<br>
          src_addr, dst_addr, length, start를 write합니다.
        `;
      } else if (currentStep === 2) {
        els.nodeDma.classList.add('pulse');
        els.flowIpDma.classList.add('active');
        els.flowDmaBus.classList.add('active');
        els.flowBusDramDma.classList.add('active');
        els.tagDmaData.classList.add('active');
        els.tagDmaBurst.classList.add('active');
        els.statusBox.innerHTML = `
          <strong style="color:var(--accent-yellow)">Step 2: DMA 데이터 전송 (DMA = Master)</strong><br>
          DMA가 스스로 Bus Master가 되어 IP의 데이터를 DRAM으로 Burst Write합니다.<br>
          <i>이때 CPU는 자유롭게 다른 작업 가능.</i>
        `;
      } else if (currentStep === 3) {
        els.nodeCpu.classList.add('pulse');
        els.flowIrq.classList.add('active');
        els.tagIrq.classList.add('active');
        els.statusBox.innerHTML = `
          <strong style="color:var(--accent-red)">Step 3: IRQ Assert</strong><br>
          전송 완료 시 DMA가 CPU로 IRQ 신호를 올립니다.<br>
          CPU는 하던 일을 멈추고 ISR에서 Pending Status를 확인 후 clear합니다.
        `;
      }
    }

    else if (currentMode === 3) {
      els.nodeCpu.classList.add('pulse');
      els.nodeIp.classList.add('pulse');
      els.flowIpBus.classList.add('active');
      els.tagCpuRead.classList.add('active');
      els.statusBox.innerHTML = `
        <strong style="color:var(--accent-blue)">RO Register Polling</strong><br>
        IP가 생성한 결과를 CPU가 수천 번 Read/Polling합니다.<br><br>
        <i>단점:</i> IP 하드웨어 면적(Size) 증가와 CPU MIPS/대역폭 낭비가 동시에 발생합니다.
      `;
    }
  }

  function playMode(mode) {
    currentMode = mode;
    currentStep = 1;
    render();
  }

  function goStep(dir) {
    const total = stepCount[currentMode];
    currentStep = Math.max(1, Math.min(total, currentStep + dir));
    render();
  }

  playMode(2);
</script>
</body>
</html>
